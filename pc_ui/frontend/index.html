<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弥娅 - 数字生命伴侣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-dark: #7c3aed;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-hover: #252542;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --border: #2a2a4a;
            --accent: #f472b6;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* 主容器 */
        .app-container {
            display: grid;
            grid-template-columns: 80px 1fr 320px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
            width: 100vw;
        }

        /* 顶部栏 */
        .header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .emotion-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-hover);
            border-radius: 20px;
            font-size: 14px;
        }

        .emotion-emoji {
            font-size: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 20px 10px;
            gap: 10px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .sidebar-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
        }

        .sidebar-item svg {
            width: 28px;
            height: 28px;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            overflow: hidden;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* 对话区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 20px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: var(--accent);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
        }

        .message.user .message-content {
            background: var(--primary);
            border: none;
        }

        .message-sender {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .message-text {
            line-height: 1.6;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* 输入区域 */
        .input-container {
            display: flex;
            gap: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            max-height: 150px;
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        .input-actions {
            display: flex;
            gap: 8px;
            margin-left: 10px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .send-btn {
            padding: 12px 24px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* 会话列表 */
        .session-item {
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: var(--bg-hover);
            border-color: var(--primary);
        }

        .session-item.active {
            background: var(--bg-hover);
            border-color: var(--primary);
        }

        .session-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .session-preview {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Agent选择器 */
        .agent-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 15px;
        }

        .agent-card {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .agent-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .agent-card.active {
            border-color: var(--primary);
            background: var(--bg-hover);
        }

        .agent-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .agent-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 笔记列表 */
        .note-item {
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .note-item:hover {
            background: var(--bg-hover);
        }

        .note-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .note-preview {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .note-tags {
            margin-top: 8px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 60px 1fr 280px;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: 60px 1fr;
            }

            .sidebar {
                position: fixed;
                left: -80px;
                z-index: 1000;
                transition: left 0.3s;
            }

            .sidebar.open {
                left: 0;
            }

            .right-panel {
                position: fixed;
                right: -320px;
                z-index: 1000;
                transition: right 0.3s;
            }

            .right-panel.open {
                right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部栏 -->
        <header class="header">
            <div class="header-left">
                <div class="logo">弥娅</div>
                <div class="emotion-indicator">
                    <span class="emotion-emoji">😊</span>
                    <span id="emotion-text">平静</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-dot"></div>
                <span style="font-size: 12px; color: var(--text-secondary);">在线</span>
            </div>
        </header>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-item active" data-tab="chat" title="对话">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <div class="sidebar-item" data-tab="agents" title="Agents">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                </svg>
            </div>
            <div class="sidebar-item" data-tab="groups" title="群聊">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </div>
            <div class="sidebar-item" data-tab="notes" title="笔记">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </div>
            <div class="sidebar-item" data-tab="canvas" title="画布">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </div>
            <div class="sidebar-item" data-tab="settings" title="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 对话标签页 -->
            <div class="tab-content active" id="chat-tab">
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            <span>弥娅正在思考...</span>
                        </div>
                    </div>
                    <div class="input-container">
                        <div class="input-wrapper">
                            <textarea id="user-input" placeholder="和弥娅聊点什么..." rows="1"></textarea>
                            <div class="input-actions">
                                <button class="action-btn" title="上传图片">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                        <polyline points="21 15 16 10 5 21"></polyline>
                                    </svg>
                                </button>
                                <button class="action-btn" title="语音输入">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                        <line x1="12" y1="19" x2="12" y2="23"></line>
                                        <line x1="8" y1="23" x2="16" y2="23"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <button class="send-btn" id="send-btn" disabled>发送</button>
                    </div>
                </div>
            </div>

            <!-- Agents标签页 -->
            <div class="tab-content" id="agents-tab">
                <div style="padding: 20px;">
                    <h2 style="margin-bottom: 20px;">选择Agent</h2>
                    <div class="agent-selector" id="agent-selector">
                        <!-- Agent卡片动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 群聊标签页 -->
            <div class="tab-content" id="groups-tab">
                <div style="padding: 20px;">
                    <h2 style="margin-bottom: 20px;">群聊</h2>
                    <button id="create-group-btn" style="padding: 10px 20px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer;">
                        创建新群聊
                    </button>
                    <div id="groups-container" style="margin-top: 20px;">
                        <!-- 群聊列表动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 笔记标签页 -->
            <div class="tab-content" id="notes-tab">
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>笔记</h2>
                        <button id="create-note-btn" style="padding: 10px 20px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer;">
                            创建笔记
                        </button>
                    </div>
                    <input type="text" id="note-search" placeholder="搜索笔记..." style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); margin-bottom: 15px;">
                    <div id="notes-container">
                        <!-- 笔记列表动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 画布标签页 -->
            <div class="tab-content" id="canvas-tab">
                <div style="padding: 20px;">
                    <h2 style="margin-bottom: 20px;">画布</h2>
                    <canvas id="drawing-canvas" style="width: 100%; height: 600px; background: var(--bg-card); border-radius: 12px;"></canvas>
                </div>
            </div>

            <!-- 设置标签页 -->
            <div class="tab-content" id="settings-tab">
                <div style="padding: 20px;">
                    <h2 style="margin-bottom: 20px;">设置</h2>
                    <div style="background: var(--bg-card); padding: 20px; border-radius: 12px;">
                        <h3>人格设置</h3>
                        <p style="color: var(--text-secondary); margin-top: 10px;">调整弥娅的人格参数</p>
                        <!-- 人格滑块 -->
                    </div>
                </div>
            </div>
        </main>

        <!-- 右侧面板 -->
        <aside class="right-panel">
            <div class="panel-header">
                <span class="panel-title">会话历史</span>
            </div>
            <div class="panel-content" id="sessions-container">
                <!-- 会话列表动态生成 -->
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
